{% extends "base.html" %}

{% block content %}

<style>
.home-box {

    margin: 40px auto;
    background: white;
    padding: 30px;
    border-radius: 14px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    text-align: center;
}

.home-title {
    font-size: 26px;
    font-weight: bold;
    margin-bottom: 15px;
}

.home-sub {
    font-size: 16px;
    color: #666;

}

.home-links a {
    display: block;
    padding: 14px;
    background: #0d6efd;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    margin-bottom: 10px;
    font-size: 15px;

.home-links a:hover {

}

        <a href="{% url 'inventory_app:supervisor_sessions_list' %}">🧑‍💼 جلسات المشرف</a>

{% endblock %}
