{% extends "base.html" %}

{% block title %}بدء جلسة جرد{% endblock %}

{% block content %}

<style>
    body {
        font-family: "Cairo", sans-serif;
        background: #f3f7fa;
        margin: 0;
        padding: 0;
    }

    .container { padding: 20px; }

    .box {
        background: #fff;
        padding: 18px;
        border-radius: 12px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        max-width: 480px;
        margin: 20px auto;
    }

    .error-box {
        background: #ffdddd;
        color: #a00;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 15px;
        text-align: center;
    }

    label { display: block; margin-bottom: 6px; font-size: 15px; }

    select {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #ccc;
        margin-bottom: 15px;
        font-size: 15px;
    }

    .btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #0d6efd;
        color: #fff;
        font-size: 17px;
        cursor: pointer;
    }
    .btn:hover { background: #0a58ca; }
</style>

<div class="container">
    <div class="box">

        {% if error %}
        <div class="error-box">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <!-- المنطقة -->
            <label>اختر المنطقة:</label>
            <select name="region" id="region-select">
                <option value="">اختر المنطقة</option>
                {% for r in regions %}
                <option value="{{ r.id }}">{{ r.name }}</option>
                {% endfor %}
            </select>

            <!-- المدينة -->
            <label>اختر المدينة:</label>
            <select name="city" id="city-select">
                <option value="">اختر المدينة</option>
            </select>

            <!-- المبنى -->
            <label>اختر المبنى:</label>
            <select name="building" id="building-select">
                <option value="">اختر المبنى</option>
            </select>

            <button class="btn">بدء جلسة الجرد</button>
        </form>
    </div>
</div>

<script>
// عند اختيار المنطقة — اجلب المدن
document.getElementById("region-select").addEventListener("change", function () {
    let regionId = this.value;

    document.getElementById("city-select").innerHTML = '<option value="">اختر المدينة</option>';
    document.getElementById("building-select").innerHTML = '<option value="">اختر المبنى</option>';

    if (!regionId) return;

    fetch(`/inventory/ajax/cities/${regionId}/`)
        .then(response => response.json())
        .then(data => {
            let citySelect = document.getElementById("city-select");

            data.forEach(city => {
                let opt = document.createElement("option");
                opt.value = city.id;
                opt.textContent = city.name;
                citySelect.appendChild(opt);
            });
        });
});

// عند اختيار المدينة — اجلب المباني
document.getElementById("city-select").addEventListener("change", function () {
    let cityId = this.value;

    document.getElementById("building-select").innerHTML = '<option value="">اختر المبنى</option>';

    if (!cityId) return;

    fetch(`/inventory/ajax/buildings/${cityId}/`)
        .then(response => response.json())
        .then(data => {
            let buildingSelect = document.getElementById("building-select");

            data.forEach(b => {
                let opt = document.createElement("option");
                opt.value = b.id;
                opt.textContent = b.name;
                buildingSelect.appendChild(opt);
            });
        });
});
</script>

{% endblock %}
