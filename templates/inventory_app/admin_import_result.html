{% extends "base.html" %}
{% block title %}نتيجة الاستيراد{% endblock %}

{% block content %}

<div style="max-width:700px;margin:auto;background:white;padding:20px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.1);">

    <h2>📊 نتيجة استيراد الملف</h2>

    <p><strong>تمت الإضافة:</strong> {{ added }}</p>
    <p><strong>تخطي:</strong> {{ skipped }}</p>

    {% if errors %}
    <h4>الأخطاء:</h4>
    <ul>
        {% for err in errors %}
        <li style="color: red">{{ err }}</li>
        {% endfor %}
    </ul>
    {% endif %}

    <a href="{% url 'inventory_app:admin_import_assets' %}" class="btn btn-secondary mt-3">
        رجوع لصفحة الاستيراد
    </a>

</div>

{% endblock %}
