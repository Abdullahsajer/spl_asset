<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}SPL Inventory{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

        body {
            margin: 0;
            font-family: "Cairo", sans-serif;
            background: #f2f4f6;
        }

        /* ======= Navbar ======= */
        .navbar {
            background: #0057b7;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .navbar-title {
            font-size: 20px;
            font-weight: bold;
        }

        .navbar-user {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .navbar-user span {
            font-size: 14px;
        }

        .navbar-user a {
            color: white;
            text-decoration: none;
            background: rgba(255,255,255,0.2);
            padding: 6px 12px;
            border-radius: 6px;
            transition: 0.2s;
        }

        .navbar-user a:hover {
            background: rgba(255,255,255,0.35);
        }

        /* ======= المحتوى ======= */
        .content {
            padding: 20px;
        }

    </style>
</head>

<body>

    <!-- ================= NAVBAR ================= -->
    <div class="navbar">
        <div class="navbar-title">
            نظام جرد الأصول – SPL
        </div>

        <div class="navbar-user">

            {% if user.is_authenticated %}
                <span>👤 {{ user.username }}</span>

                <a href="{% url 'accounts_app:profile' %}">صفحتي</a>

                <a href="{% url 'accounts_app:logout' %}">
                    تسجيل الخروج
                </a>

            {% else %}

                <a href="/accounts/login/">تسجيل الدخول</a>

            {% endif %}
        </div>
    </div>

    <!-- ================= المحتوى ================= -->
    <div class="content">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
