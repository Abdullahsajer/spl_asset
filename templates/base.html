<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}SPL Inventory{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Cairo", sans-serif;
            background: #f2f4f6;
        }

        header {
            background: #0d6efd;
            padding: 15px;
            color: white;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        .content {
            padding: 20px;
        }
    </style>

</head>
<body>

<header>نظام جرد الأصول - SPL</header>

<div class="content">
    {% block content %}{% endblock %}
</div>

</body>
</html>
