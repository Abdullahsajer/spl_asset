{% extends "base.html" %}
{% block title %}استيراد المناطق والمباني{% endblock %}

{% block content %}

<h2>📥 استيراد المناطق - المدن - المباني</h2>

<form method="POST" enctype="multipart/form-data" style="margin-top:20px;">
    {% csrf_token %}

    <label>📄 اختر ملف Excel:</label><br>
    <input type="file" name="file" accept=".xlsx,.xls" required>

    <button type="submit" style="margin-top:15px;padding:10px 18px;background:#0d6efd;color:#fff;border:none;border-radius:8px;">
        رفع الملف
    </button>
</form>

<p style="margin-top:20px;color:gray;">
يجب أن يحتوي ملف Excel على الأعمدة التالية:
<br><strong>region_name – city_name – building_name</strong>
</p>

{% endblock %}
